name: Daily Poem

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

jobs:
  daily:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run daily script
        run: python send_daily.py
